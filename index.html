<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DB CLIENT | Private Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Rajdhani:wght@600;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent-cyan: #00f2ff;
            --accent-purple: #9d00ff;
            --accent-red: #ff4444;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-width: 260px;
            --nav-height: 0px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        .bg-glow { position: fixed; width: 40vw; height: 40vw; z-index: -1; filter: blur(100px); opacity: 0.15; pointer-events: none; }

        /* --- SIDEBAR (Laptop) / BOTTOM NAV (Mobile) --- */
        aside {
            position: fixed; left: 0; top: 0; width: var(--sidebar-width); height: 100%;
            background: rgba(5, 5, 5, 0.98); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 40px 25px; z-index: 1000;
            transition: all 0.4s ease;
        }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 60px; }
        .brand img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--accent-cyan); }
        .brand span { font-family: 'Rajdhani'; font-weight: bold; font-size: 1.6rem; letter-spacing: 1.5px; }

        .nav-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            color: #555; padding: 18px; border-radius: 14px; margin-bottom: 20px;
            text-align: left; cursor: pointer; transition: 0.4s;
            font-family: 'Rajdhani'; font-size: 1.2rem; text-transform: uppercase;
            width: 100%;
        }
        .nav-btn:hover { border-color: var(--accent-cyan); color: #fff; }
        .nav-btn.active { background: var(--accent-purple); color: #fff; border: none; box-shadow: 0 0 25px rgba(157, 0, 255, 0.3); }

        /* --- MAIN VIEWPORT --- */
        main {
            margin-left: var(--sidebar-width); height: 100%; width: calc(100% - var(--sidebar-width));
            display: flex; align-items: center; justify-content: center; position: relative;
            transition: all 0.4s ease;
        }

        .page {
            position: absolute; width: 90%; height: 90%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .page.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HOME --- */
        .hero-title { font-family: 'Rajdhani'; font-size: clamp(2.5rem, 8vw, 6rem); text-align: center; }
        .hero-sub { color: #333; font-weight: bold; letter-spacing: 4px; margin-top: 5px; text-align: center; }

        /* --- ABOUT (CREATORS) --- */
        .glowing-creators {
            background: rgba(157, 0, 255, 0.15); color: var(--accent-purple);
            padding: 8px 25px; border-radius: 50px; border: 1px solid var(--accent-purple);
            font-family: 'Rajdhani'; font-weight: bold; font-size: 0.9rem;
            text-transform: uppercase; margin-bottom: 30px;
        }

        .character-row { display: flex; gap: 5vw; align-items: flex-end; justify-content: center; width: 100%; }
        .char-box { text-align: center; flex: 1; max-width: 250px; }
        .char-box img { width: 100%; height: auto; max-height: 50vh; filter: drop-shadow(0 0 20px rgba(0,0,0,0.6)); }
        
        .mc-name {
            font-family: 'VT323', monospace; font-size: clamp(1.2rem, 4vw, 2.2rem); margin-bottom: 8px;
            background: rgba(0,0,0,0.85); padding: 4px 10px; border-radius: 6px; display: inline-block;
        }
        .role-label { display: block; font-family: 'Inter'; font-size: 0.65rem; color: #444; font-weight: bold; text-transform: uppercase; }

        /* --- INFORMATION --- */
        .info-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 20px; width: 100%; max-width: 500px;
        }
        .info-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-label { color: #444; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; }
        .info-value { color: var(--accent-cyan); font-family: 'Rajdhani'; font-weight: bold; }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 800px) {
            aside {
                width: 100%; height: 70px; top: auto; bottom: 0;
                flex-direction: row; padding: 10px; border-right: none; border-top: 1px solid var(--glass-border);
                justify-content: space-around;
            }
            .brand { display: none; } /* Hide logo on mobile bottom bar */
            .nav-btn { margin-bottom: 0; padding: 10px; font-size: 0.8rem; text-align: center; border-radius: 8px; }
            .nav-btn span { display: block; }
            
            main { margin-left: 0; width: 100%; height: calc(100% - 70px); }
            .character-row { gap: 10px; align-items: center; }
            .char-box img { max-height: 40vh; }
            .hero-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: 10%; right: 10%; background: radial-gradient(circle, var(--accent-cyan), transparent 70%);"></div>
    <div class="bg-glow" style="bottom: 10%; left: 10%; background: radial-gradient(circle, var(--accent-purple), transparent 70%);"></div>

    <aside>
        <div class="brand">
            <img src="logo.png" alt="DB">
            <span>DB CLIENT</span>
        </div>
        <button id="btn-home" class="nav-btn active" onclick="showPage('home')"><span>Home</span></button>
        <button id="btn-about" class="nav-btn" onclick="showPage('about')"><span>About</span></button>
        <button id="btn-info" class="nav-btn" onclick="showPage('info')"><span>Info</span></button>
        <button id="btn-leaked" class="nav-btn" onclick="showPage('leaked')"><span style="color:var(--accent-red)">Leaked</span></button>
    </aside>

    <main>
        <div id="home" class="page active">
            <h1 class="hero-title">DB CLIENT</h1>
            <p class="hero-sub">PRIVATE 1.21 ADVANTAGE</p>
        </div>

        <div id="about" class="page">
            <div class="glowing-creators">Creators</div>
            <div class="character-row">
                <div class="char-box">
                    <div class="mc-name" style="color: var(--accent-purple);">BloodRift_</div>
                    <img src="blood.png" alt="BloodRift">
                    <span class="role-label">Lead Dev</span>
                </div>
                <div class="char-box">
                    <div class="mc-name" style="color: var(--accent-cyan);">Turbo</div>
                    <img src="turbo.png" alt="Turbo">
                    <span class="role-label">Owner</span>
                </div>
            </div>
        </div>

        <div id="info" class="page">
            <div class="info-card">
                <h2 style="margin-bottom: 15px; font-family: 'Rajdhani';">SPECS</h2>
                <div class="info-item"><span class="info-label">Modules</span><span class="info-value">20+ Bypassed</span></div>
                <div class="info-item"><span class="info-label">Version</span><span class="info-value">1.21 Minecraft</span></div>
                <div class="info-item"><span class="info-label">Loader</span><span class="info-value">Fabric</span></div>
                <div class="info-item"><span class="info-label">Injectable</span><span class="info-value">No (Normal Client)</span></div>
                <div class="info-item"><span class="info-label">Loader</span><span class="info-value">Special .JAR</span></div>
            </div>
        </div>

        <div id="leaked" class="page">
            <h2 style="color: var(--accent-red); font-family: 'Rajdhani'; font-size: 2.5rem;">UNLEAKED</h2>
            <p style="color: #333; font-weight: bold;">Official builds are only available here.</p>
        </div>
    </main>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');
        }
    </script>
</body>
</html>
